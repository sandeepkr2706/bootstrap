<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hobby Cards</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        body {

            background-color: #f9f9f9;

            font-family: Arial, sans-serif;

            padding: 30px 15px;

        }


        h1 {

            text-align: center;

            color: #FF5A43;

        }


        .hobby-card {

            text-align: center;

            border: 2px solid #FF5A43;

            border-radius: 8px;

            padding: 20px;

            margin-bottom: 20px;

            background-color: #fff8e1;

        }


        .hobby-card h3 {

            color: #FF5A43;

        }
    </style>
</head>

<body>
    <h1>My Hobby Cards</h1>
    <div class="container">

        <div class="row">
            <div class="col-6 col-md-6 col-lg-4">

                <div class="hobby-card">

                    <h3>Drawing</h3>

                    <p>I love sketching animals and comic characters.</p>

                </div>

            </div>
            <div class="col-4 col-md-6 col-lg-4">

                <div class="hobby-card">

                    <h3>Chess</h3>

                    <p>I love playing chess as it is very intresting.</p>

                </div>

            </div>
            <div class="col-12 col-md-6 col-lg-4">

                <div class="hobby-card">

                    <h3>Music</h3>

                    <p>I love music as it is very soothing.</p>

                </div>

            </div>
        </div>
    </div>

</body>

</html>
